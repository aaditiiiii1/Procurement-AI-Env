version: "3.9"

services:
  procurement-ai-env:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: procurement-ai-env
    ports:
      - "7860:7860"
    environment:
      - PYTHONUNBUFFERED=1
    env_file:
      - .env
    volumes:
      - ./results:/app/results
      - ./logs:/app/logs
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 8G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7860/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
